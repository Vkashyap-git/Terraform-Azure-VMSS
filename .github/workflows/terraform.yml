name: Terraform Deploy 

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_resource_group_name: ${{ vars.TF_VAR_RESOURCE_GROUP_NAME }}
      TF_VAR_admin_username: ${{ vars.TF_VAR_ADMIN_USERNAME }}
      TF_VAR_ssh_public_key: ${{ vars.TF_VAR_SSH_PUBLIC_KEY }}
      TF_VAR_ghcr_username: ${{ vars.TF_VAR_GHCR_USERNAME }}
      TF_VAR_ghcr_token: ${{ secrets.TF_VAR_GHCR_TOKEN }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Azure login (recommended OIDC approach)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
     
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -recursive
   
      - name: Terraform Init
        run: terraform init -reconfigure
     
      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan 

      - name: Terraform Apply
        run: terraform apply 
